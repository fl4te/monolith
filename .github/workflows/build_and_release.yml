name: Build & Release Monolith

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "APP_VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Bake version into source
        shell: bash
        run: |
          echo "__version__ = \"${{ steps.version.outputs.APP_VERSION }}\"" > _version.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard
          pip install -r requirements.txt

      # Build (Windows)
      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --disable-console `
            --enable-plugin=tk-inter `
            --assume-yes-for-downloads `
            --include-module=pil_config `
            --include-module=PIL.Image `
            --include-module=PIL.ImageTk `
            --include-module=PIL._tkinter_finder `
            --include-module=PIL.JpegImagePlugin `
            --include-module=PIL.PngImagePlugin `
            --include-module=PIL.TgaImagePlugin `
            --nofollow-import-to=PIL.BmpImagePlugin `
            --nofollow-import-to=PIL.GifImagePlugin `
            --nofollow-import-to=PIL.TiffImagePlugin `
            --nofollow-import-to=PIL.WebPImagePlugin `
            --nofollow-import-to=PIL.PdfImagePlugin `
            --nofollow-import-to=PIL.PcxImagePlugin `
            --nofollow-import-to=PIL.IcoImagePlugin `
            --nofollow-import-to=PIL.XpmImagePlugin `
            --nofollow-import-to=PIL.FtexImagePlugin `
            --windows-icon-from-ico=icon.ico `
            --windows-product-version="${{ steps.version.outputs.APP_VERSION }}.0" `
            --windows-file-version="${{ steps.version.outputs.APP_VERSION }}.0" `
            --lto=yes `
            --include-package-data=customtkinter `
            --output-dir=packaged `
            monolith.py

      # Build (Linux & macOS)
      - name: Build executable (Linux & macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          python -m nuitka \
            --standalone \
            --onefile \
            --enable-plugin=tk-inter \
            --assume-yes-for-downloads \
            --include-module=pil_config \
            --include-module=PIL.Image \
            --include-module=PIL.ImageTk \
            --include-module=PIL._tkinter_finder \
            --include-module=PIL.JpegImagePlugin \
            --include-module=PIL.PngImagePlugin \
            --include-module=PIL.TgaImagePlugin \
            --nofollow-import-to=PIL.BmpImagePlugin \
            --nofollow-import-to=PIL.GifImagePlugin \
            --nofollow-import-to=PIL.TiffImagePlugin \
            --nofollow-import-to=PIL.WebPImagePlugin \
            --nofollow-import-to=PIL.PdfImagePlugin \
            --nofollow-import-to=PIL.PcxImagePlugin \
            --nofollow-import-to=PIL.IcoImagePlugin \
            --nofollow-import-to=PIL.XpmImagePlugin \
            --nofollow-import-to=PIL.FtexImagePlugin \
            --lto=yes \
            --include-package-data=customtkinter \
            --output-dir=packaged \
            monolith.py

      # Package Windows
      - name: Package Windows ZIP
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          mkdir final-dist -Force
          Compress-Archive packaged/monolith.exe final-dist/Monolith-windows.zip -Force

      # Package Linux
      - name: Package Linux tar.gz
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -e
          mkdir -p final-dist
          BIN_FILE=(packaged/monolith*)
          BIN_FILE="${BIN_FILE[0]}"
          tar -czvf final-dist/Monolith-linux.tar.gz -C packaged "$(basename "$BIN_FILE")"

      # Package macOS (.app + DMG)
      - name: Package macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -e

          APP_NAME="Monolith"
          APP_VERSION="${{ steps.version.outputs.APP_VERSION }}"
          APP_DIR="dmg/${APP_NAME}.app"
          ICONSET="icon.iconset"

          mkdir -p "${APP_DIR}/Contents/MacOS" "${APP_DIR}/Contents/Resources"

          BIN_FILE=(packaged/monolith*)
          BIN_FILE="${BIN_FILE[0]}"
          cp "$BIN_FILE" "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          chmod +x "${APP_DIR}/Contents/MacOS/${APP_NAME}"

          sips -s format png icon.ico --out icon.png || true
          if [ ! -f icon.png ]; then
            # Fallback: create a plain placeholder if sips conversion failed
            python3 -c "
          from PIL import Image
          img = Image.new('RGBA', (512, 512), (26, 26, 46, 255))
          img.save('icon.png')
          "
          fi

          mkdir -p "${ICONSET}"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE icon.png --out "${ICONSET}/icon_${SIZE}x${SIZE}.png"
          done
          cp "${ICONSET}/icon_512x512.png" "${ICONSET}/icon_512x512@2x.png"

          iconutil -c icns "${ICONSET}" -o "${APP_DIR}/Contents/Resources/icon.icns"
          rm -rf "${ICONSET}" icon.png

          cat > "${APP_DIR}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>com.flate.monolith</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>${APP_VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${APP_VERSION}</string>
              <key>NSHighResolutionCapable</key>
              <true/>
            </dict>
          </plist>
          EOF

          mkdir -p final-dist
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            -fs HFS+ \
            final-dist/Monolith-macos.dmg

      # Upload artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monolith-${{ matrix.os }}
          path: final-dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "APP_VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        shell: bash
        run: |
          TAG="v${{ steps.version.outputs.APP_VERSION }}"

          gh release create "$TAG" release-assets/* \
            --title "Release $TAG" \
            --notes "Automated build for version ${{ steps.version.outputs.APP_VERSION }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
